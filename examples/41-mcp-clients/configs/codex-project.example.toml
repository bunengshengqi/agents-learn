# 复制为项目根目录的 .codex/config.toml 后，请替换下面的绝对路径。
# Codex 只会读取已信任项目中的项目级配置。

[mcp_servers.day41_learning]
command = "/ABSOLUTE/PATH/TO/agents-learn/.venv/bin/python"
args = ["/ABSOLUTE/PATH/TO/agents-learn/examples/41-mcp-clients/local_server.py"]
cwd = "/ABSOLUTE/PATH/TO/agents-learn"
startup_timeout_sec = 10
tool_timeout_sec = 60
enabled = true
required = false
enabled_tools = ["add", "make_study_plan"]
default_tools_approval_mode = "prompt"

# 远程 Streamable HTTP 示例。令牌值放入环境变量，不写进公开仓库。
[mcp_servers.remote_example]
url = "https://example.com/mcp"
bearer_token_env_var = "REMOTE_MCP_TOKEN"
enabled = false
